# CI 工作流名称
name: CI

# 触发条件：当代码推送到 main 或 master 分支，或创建 pull request 到这些分支时
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 测试 job：运行测试并生成覆盖率报告
  test:
    # 运行环境：最新的 Ubuntu (由github actions提供)
    runs-on: ubuntu-latest
    # 测试策略：矩阵测试多个 Python 版本
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    # 1. 检出代码仓库
    - uses: actions/checkout@v4

    # 2. 设置 Python 版本（根据矩阵中的版本）
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. 安装依赖（包括开发依赖）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    # 4. 运行测试并生成覆盖率报告
    - name: Run tests with pytest
      run: pytest --cov=remote_hosts --cov-report=xml

    # 5. 上传覆盖率报告到 Codecov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false  # 即使上传失败也不影响 CI 结果

  # 代码质量检查 job
  lint:
    # 运行环境：最新的 Ubuntu
    runs-on: ubuntu-latest
    steps:
    # 1. 检出代码仓库
    - uses: actions/checkout@v4

    # 2. 设置 Python 版本（使用最低支持版本 3.8）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    # 3. 安装依赖（包括开发依赖）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    # 4. 运行 Pylint 进行代码质量检查
    - name: Run pylint
      run: pylint remote_hosts/

    # 5. 运行 Mypy 进行类型检查
    - name: Run mypy
      run: mypy remote_hosts/

    # 6. 运行 Bandit 进行安全检查（即使失败也继续）
    - name: Run bandit
      run: bandit -r remote_hosts/ -f json -o bandit-report.json || true

    # 7. 上传安全检查报告
    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()  # 无论前面步骤是否成功都执行
      with:
        name: bandit-report
        path: bandit-report.json
